!function(f,b,e,v,n,t,s){
  if(f.fbq) return;
  n=f.fbq=function(){

  };
  if(!f._fbq) f._fbq=n;
  n.push=n;
  n.loaded=!0;
  n.version='2.0';
  n.queue=[];
  t=b.createElement(e);
  t.async=!0;
  t.src=v;
  s=b.getElementsByTagName(e)[0];

}(window, document, 'script', 'https://connect.facebook.net/en_US/fbevents.js');

<style>
*{
  box-sizing:border-box;
}

html,body{
  margin:0;
  padding:0;
  width:100%;
  min-height:100%;
  background:#000;
  font-family:system-ui,-apple-system,"PingFang TC","Noto Sans TC",Arial,sans-serif;
}

.wrapper{
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  min-height:100svh;
  background:#000;
}

.frame{
  position:relative;
  width:100%;
  max-width:420px;
  aspect-ratio:9/16;
  overflow:hidden;
  background:#000;
}

.bg{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:1;
  pointer-events:none;
  user-select:none;
  -webkit-user-drag:none;
}

.ip{
  position:absolute;
  bottom:25%;
  left:65%;
  transform:translateX(-50%);
  width:100%;
  z-index:3;
  pointer-events:none;
  user-select:none;
  -webkit-user-drag:none;
  animation:ipBreath 1.8s ease-in-out infinite;
  will-change:transform;
}

.btnWrapper{
  position:absolute;
  bottom:13%;
  left:50%;
  transform:translateX(-50%);
  width:80%;
  z-index:10;
}

.goLine{
  display:block;
  width:100%;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  text-decoration:none;
  outline:none;
}

.btn{
  display:block;
  width:100%;
  height:auto;
  cursor:pointer;
  animation:breath 1.8s ease-in-out infinite;
  will-change:transform;
  user-select:none;
  -webkit-user-drag:none;
}

@keyframes breath{
  0%{
    transform:scale(1);
  }
  50%{
    transform:scale(1.08);
  }
  100%{
    transform:scale(1);
  }
}

@keyframes ipBreath{
  0%{
    transform:translateX(-50%) scale(1);
  }
  50%{
    transform:translateX(-50%) scale(1.08);
  }
  100%{
    transform:translateX(-50%) scale(1);
  }
}
</style>
</head>

<body>
<div class="wrapper">
  <div class="frame">
    <img src="assets/bg.jpg" class="bg" alt="" loading="eager" decoding="async">
    <img src="assets/ip.png" class="ip" alt="" loading="eager" decoding="async">

    <!-- 只有真正按鈕 Btn 可以點擊 -->
    <div class="btnWrapper">
      <a href="https://line.me/R/ti/p/@807haihf"
         class="goLine"
         data-area="btn"
         id="lineBtn"
         rel="noopener"
         aria-label="加入官方LINE">
        <img src="assets/btn.png" class="btn" alt="加入官方LINE" loading="eager" decoding="async">
      </a>
    </div>
  </div>
</div>

<script>
(function(){
  const PIXEL_ID = "1081227361011582";
  const LINE_URL = "https://line.me/R/ti/p/@807haihf";
  // 建立此品牌專屬 Worker 後，只需把下方網址替換成實際 workers.dev 網址，保留 /track
  const CAPI_ENDPOINT = "https://lgai16802.skype138388.workers.dev/track";
  const EVENT_NAMES = ["CompleteRegistration", "Contact"];
  const REDIRECT_DELAY_MS = 1800;

  let clicked = false;

  function createEventId(prefix){
    const safePrefix = prefix || "evt";
    if(window.crypto && typeof window.crypto.randomUUID === "function"){
      return safePrefix + "_" + window.crypto.randomUUID();
    }
    return safePrefix + "_" + Date.now() + "_" + Math.random().toString(36).slice(2,12);
  }

  function getCookie(name){
    const escaped = name.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    const match = document.cookie.match(new RegExp("(?:^|;\\s*)" + escaped + "=([^;]*)"));
    return match ? decodeURIComponent(match[1]) : "";
  }

  function getFbc(){
    const cookie = getCookie("_fbc");
    if(cookie) return cookie;
    const fbclid = new URLSearchParams(location.search).get("fbclid");
    return fbclid ? "fb.1." + Date.now() + "." + fbclid : "";
  }

  function fireBrowserEvent(eventName, eventId, area){
    if(typeof window.fbq !== "function") return;
    window.fbq(
      "trackSingle",
      PIXEL_ID,
      eventName,
      {contact_method:"line", click_area:area},
      {eventID:eventId}
    );
  }

  async function fireServerEvent(eventName, eventId, area){
    if(CAPI_ENDPOINT.includes("YOUR-WORKER")){
      throw new Error("請先設定 CAPI_ENDPOINT");
    }

    const payload = {
      event_name: eventName,
      event_id: eventId,
      event_source_url: location.href,
      fbp: getCookie("_fbp"),
      fbc: getFbc(),
      click_area: area
    };

    const response = await fetch(CAPI_ENDPOINT, {
      method: "POST",
      mode: "cors",
      credentials: "omit",
      cache: "no-store",
      keepalive: true,
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify(payload)
    });

    const text = await response.text();
    let result;
    try { result = JSON.parse(text); }
    catch { result = {ok:false,error:"Worker 回應不是 JSON",raw:text}; }

    if(!response.ok || !result.ok){
      throw new Error(result.error || result.meta_error?.error?.message || "CAPI 送出失敗");
    }
    return result;
  }

  function goLine(){ location.assign(LINE_URL); }

  const buttons = document.querySelectorAll(".goLine");
  buttons.forEach(function(btn){
    btn.setAttribute("href", LINE_URL);
    btn.addEventListener("click", function(e){
      e.preventDefault();
      if(clicked) return;
      clicked = true;

      const area = btn.dataset.area || "btn";
      const events = [
        {eventName:"CompleteRegistration", eventId:createEventId("reg")},
        {eventName:"Contact", eventId:createEventId("contact")}
      ];

      events.forEach(function(item){
        fireBrowserEvent(item.eventName, item.eventId, area);
      });

      let redirected = false;
      const redirectOnce = function(){
        if(redirected) return;
        redirected = true;
        goLine();
      };

      const timer = setTimeout(redirectOnce, REDIRECT_DELAY_MS);
      Promise.allSettled(events.map(function(item){
        return fireServerEvent(item.eventName, item.eventId, area);
      })).then(function(results){
        results.forEach(function(result, index){
          const name = events[index].eventName;
          if(result.status === "fulfilled") console.log("CAPI success", name, result.value);
          else console.error("CAPI error", name, result.reason);
        });
      }).finally(function(){
          clearTimeout(timer);
          setTimeout(redirectOnce, 250);
        });
    }, {passive:false});
  });

  window.addEventListener("pageshow", function(){ clicked = false; });
})();
</script>
</body>
</html>
