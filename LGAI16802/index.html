<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>

<!-- 分享連結預覽圖：指定使用 IP 圖 -->
<meta property="og:title" content="點點富婆"/>
<meta property="og:description" content="加入官方LINE，查看活動詳情。"/>
<meta property="og:image" content="assets/ip.png"/>
<meta property="og:image:secure_url" content="assets/ip.png"/>
<meta property="og:image:type" content="image/png"/>
<meta property="og:type" content="website"/>

<meta name="twitter:card" content="summary_large_image"/>
<meta name="twitter:title" content="點點富婆"/>
<meta name="twitter:description" content="加入官方LINE，查看活動詳情。"/>
<meta name="twitter:image" content="assets/ip.png"/>

<script>
window.APP_CONFIG = {
  PIXEL_ID: '3055978374595290',
  LINE_URL: 'https://lin.ee/jzABNet',
  REDIRECT_DELAY: 800
};

!function(f,b,e,v,n,t,s){
  if(f.fbq) return;
  n=f.fbq=function(){
    n.callMethod ? n.callMethod.apply(n,arguments) : n.queue.push(arguments);
  };
  if(!f._fbq) f._fbq=n;
  n.push=n;
  n.loaded=!0;
  n.version='2.0';
  n.queue=[];
  t=b.createElement(e);
  t.async=!0;
  t.src=v;
  s=b.getElementsByTagName(e)[0];
  s.parentNode.insertBefore(t,s);
}(window, document, 'script', 'https://connect.facebook.net/en_US/fbevents.js');

fbq('init', window.APP_CONFIG.PIXEL_ID);
fbq('track', 'PageView');
</script>

<noscript>
  <img height="1" width="1" style="display:none" alt=""
    src="https://www.facebook.com/tr?id=3055978374595290&ev=PageView&noscript=1"/>
</noscript>

<style>
*{box-sizing:border-box;}
body{margin:0;background:#000;font-family:system-ui,-apple-system,"PingFang TC","Noto Sans TC",Arial,sans-serif;}
.wrapper{display:flex;justify-content:center;align-items:center;min-height:100vh;min-height:100dvh;}
.frame{position:relative;width:100%;max-width:420px;aspect-ratio:9/16;overflow:hidden;background:#000;}
.bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;user-select:none;-webkit-user-drag:none;}
.logo{position:absolute;top:5%;left:10%;transform:translateX(10%);width:60%;display:block;pointer-events:none;user-select:none;-webkit-user-drag:none;}
.ip{position:absolute;bottom:30%;left:50%;transform:translateX(-50%);width:90%;display:block;pointer-events:none;user-select:none;-webkit-user-drag:none;}
.btnWrapper{position:absolute;bottom:3%;left:50%;transform:translateX(-50%);width:80%;z-index:5;}
#lineBtn{display:block;}
.goLine{display:block;width:100%;text-decoration:none;-webkit-tap-highlight-color:transparent;outline:none;}
.btn{width:100%;cursor:pointer;display:block;animation:breath 1.8s ease-in-out infinite;user-select:none;-webkit-user-drag:none;}
.goLine.is-disabled{pointer-events:none;opacity:.98;}
@keyframes breath{0%{transform:scale(1);}50%{transform:scale(1.08);}100%{transform:scale(1);}}
</style>
</head>

<body>
<div class="wrapper">
  <div class="frame">
    <img src="assets/bg.jpg" class="bg" alt="" loading="eager">
    <img src="assets/logo.png" class="logo" alt="" loading="eager">
    <img src="assets/ip.png" class="ip" alt="" loading="eager">

    <div class="btnWrapper">
      <a href="https://lin.ee/jzABNet" class="goLine" data-area="main_cta" id="lineBtn" rel="noopener" aria-label="加入官方LINE">
        <img src="assets/btn.png" class="btn" alt="加入官方LINE" loading="eager">
      </a>
    </div>
  </div>
</div>

<script>
(function(){
  var LINE_URL = window.APP_CONFIG.LINE_URL;
  var REDIRECT_DELAY = window.APP_CONFIG.REDIRECT_DELAY;

  var links = document.querySelectorAll('.goLine');
  if (!links || !links.length) return;

  var clicked = false;
  var redirectTimer = null;

  function createEventId(prefix){
    var id = '';
    if (window.crypto && typeof window.crypto.randomUUID === 'function') {
      id = window.crypto.randomUUID();
    } else {
      id = 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,function(c){
        var r = Math.random()*16|0;
        var v = c === 'x' ? r : (r & 0x3 | 0x8);
        return v.toString(16);
      });
    }
    return prefix + '_' + id;
  }

  function resetState(){
    clicked = false;
    if (redirectTimer) {
      clearTimeout(redirectTimer);
      redirectTimer = null;
    }
    links.forEach(function(a){
      a.style.pointerEvents = '';
      a.classList.remove('is-disabled');
    });
  }

  function go(){
    window.location.href = LINE_URL;
  }

  function fireEvents(area){
    var baseArea = area || 'main_cta';

    var params = {
      content_name: 'line_contact_click',
      content_category: 'line_redirect',
      contact_method: 'line',
      click_area: baseArea,
      destination: 'official_line'
    };

    try {
      if (typeof fbq === 'function') {
        fbq('track', 'Contact', params, { eventID: createEventId('contact') });
        fbq('track', 'Lead', params, { eventID: createEventId('lead') });
        fbq('trackCustom', 'LineClick', params, { eventID: createEventId('lineclick') });
      }
    } catch(e) {}
  }

  window.addEventListener('pageshow', function(event){
    if (event.persisted) {
      resetState();
    } else {
      clicked = false;
    }
  });

  links.forEach(function(a){
    a.addEventListener('click', function(e){
      e.preventDefault();
      if (clicked) return;
      clicked = true;

      links.forEach(function(x){
        x.style.pointerEvents = 'none';
        x.classList.add('is-disabled');
      });

      fireEvents(a.getAttribute('data-area') || 'main_cta');

      redirectTimer = setTimeout(go, REDIRECT_DELAY);
    }, { passive:false });
  });
})();
</script>

</body>
</html>
