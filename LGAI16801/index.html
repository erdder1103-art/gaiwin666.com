<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>瘋狂阿健</title>

<script>
window.APP_CONFIG = {
  PIXEL_ID: '1471781568051781',
  LINE_URL: 'https://line.me/R/ti/p/@042rdsrp',
  REDIRECT_DELAY: 900
};

!function(f,b,e,v,n,t,s){
  if(f.fbq) return;
  n=f.fbq=function(){
    n.callMethod ? n.callMethod.apply(n,arguments) : n.queue.push(arguments);
  };
  if(!f._fbq) f._fbq=n;
  n.push=n;
  n.loaded=!0;
  n.version='2.0';
  n.queue=[];
  t=b.createElement(e);
  t.async=!0;
  t.src=v;
  s=b.getElementsByTagName(e)[0];
  s.parentNode.insertBefore(t,s);
}(window, document, 'script', 'https://connect.facebook.net/en_US/fbevents.js');

fbq('init', window.APP_CONFIG.PIXEL_ID);
fbq('trackSingle', window.APP_CONFIG.PIXEL_ID, 'PageView');
</script>

<noscript>
  <img height="1" width="1" style="display:none" alt=""
       src="https://www.facebook.com/tr?id=1471781568051781&ev=PageView&noscript=1"/>
</noscript>

<style>
*{
  box-sizing:border-box;
}

html,body{
  margin:0;
  padding:0;
  width:100%;
  min-height:100%;
  background:#000;
  font-family:system-ui,-apple-system,"PingFang TC","Noto Sans TC",Arial,sans-serif;
}

.wrapper{
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  min-height:100svh;
  background:#000;
}

.frame{
  position:relative;
  width:100%;
  max-width:420px;
  aspect-ratio:9/16;
  overflow:hidden;
  background:#000;
}

.bg{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:1;
  pointer-events:none;
}

.ip{
  position:absolute;
  bottom:30%;
  left:50%;
  transform:translateX(-50%);
  width:90%;
  z-index:2;
  pointer-events:none;
}

.btnWrapper{
  position:absolute;
  bottom:3%;
  left:50%;
  transform:translateX(-50%);
  width:80%;
  z-index:10;
}

.goLine{
  display:block;
  width:100%;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  text-decoration:none;
}

.btn{
  display:block;
  width:100%;
  height:auto;
  cursor:pointer;
  animation:breath 1.8s ease-in-out infinite;
  will-change:transform;
}

@keyframes breath{
  0%{transform:scale(1);}
  50%{transform:scale(1.08);}
  100%{transform:scale(1);}
}
</style>
</head>

<body>
<div class="wrapper">
  <div class="frame">
    <img src="assets/bg.jpg" class="bg" alt="" loading="eager" decoding="async">
    <img src="assets/ip.png" class="ip" alt="" loading="eager" decoding="async">

    <!-- 只有真正按鈕 Btn 可以點擊 -->
    <div class="btnWrapper">
      <a href="https://line.me/R/ti/p/@042rdsrp"
         class="goLine"
         data-area="btn"
         id="lineBtn"
         rel="noopener"
         aria-label="加入 LINE">
        <img src="assets/btn.png" class="btn" alt="加入 LINE" loading="eager" decoding="async">
      </a>
    </div>
  </div>
</div>

<script>
(function(){
  const PIXEL_ID = window.APP_CONFIG.PIXEL_ID;
  const LINE_URL = window.APP_CONFIG.LINE_URL;
  const REDIRECT_DELAY = window.APP_CONFIG.REDIRECT_DELAY;

  const btn = document.getElementById('lineBtn');
  if(!btn) return;

  let clicked = false;
  let redirectTimer = null;

  function createEventId(){
    if(window.crypto && typeof window.crypto.randomUUID === 'function'){
      return window.crypto.randomUUID();
    }

    return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,function(c){
      const r = Math.random() * 16 | 0;
      const v = c === 'x' ? r : (r & 0x3 | 0x8);
      return v.toString(16);
    });
  }

  function resetState(){
    clicked = false;

    if(redirectTimer){
      clearTimeout(redirectTimer);
      redirectTimer = null;
    }

    btn.style.pointerEvents = '';
  }

  function firePixelEvents(area){
    if(typeof fbq !== 'function') return;

    const commonParams = {
      action_source: 'website',
      contact_method: 'line',
      click_area: area || 'btn',
      event_source_url: window.location.href
    };

    try{
      fbq(
        'trackSingle',
        PIXEL_ID,
        'Lead',
        commonParams,
        {eventID: createEventId()}
      );
    }catch(e){}

    try{
      fbq(
        'trackSingle',
        PIXEL_ID,
        'Contact',
        commonParams,
        {eventID: createEventId()}
      );
    }catch(e){}
  }

  function goLine(){
    window.location.href = LINE_URL;
  }

  btn.addEventListener('click', function(e){
    e.preventDefault();

    if(clicked) return;
    clicked = true;

    btn.style.pointerEvents = 'none';

    const area = btn.getAttribute('data-area') || 'btn';

    firePixelEvents(area);

    redirectTimer = setTimeout(goLine, REDIRECT_DELAY);
  }, {passive:false});

  window.addEventListener('pageshow', function(){
    resetState();
  });
})();
</script>
</body>
</html>
